# ═══════════════════════════════════════════════════════════
#  AI-Staff V4.1 配置文件
# ═══════════════════════════════════════════════════════════
#
#  使用方式：
#    1. 复制此文件为 config.yaml
#    2. 填写你的 API Key（至少填一个）
#    3. 启动: python -c "from ai_staff_v4 import AIStaff; s=AIStaff.from_config_file('config.yaml'); print(s.chat('hello'))"
#
#  环境变量模式（无需配置文件）：
#    set GEMINI_API_KEY=your-key
#    python -c "from ai_staff_v4 import AIStaff; s=AIStaff.from_env(); print(s.chat('hello'))"
#

# ── 默认模型 ──
default_model: ""

# ── 全局设置 ──
settings:
  proxy: ""                          # HTTP代理, 如 http://127.0.0.1:7890 (海外Provider需要)
  default_expert: "generalist"       # 默认专家
  timeout: 120                       # API超时(秒)
  max_retries: 3                     # 重试次数
  language: "zh-CN"

# ── LLM 后端配置 ──
#  10个Provider按需开启，填key即用
#  国内Provider(DeepSeek/Moonshot/Qwen/Zhipu/SiliconFlow)不需要代理
#  海外Provider(Gemini/OpenAI/Groq/Anthropic)需要代理
profiles:
  # ═══ 国内友好（无需代理）═══

  # DeepSeek — 性价比之王
  deepseek:
    provider: "deepseek"
    base_url: "https://api.deepseek.com/v1"
    api_key: "${DEEPSEEK_API_KEY}"
    model: "deepseek-chat"
    tier: "cheap"
    priority: 9

  # Moonshot (Kimi) — 长上下文
  # moonshot:
  #   provider: "moonshot"
  #   base_url: "https://api.moonshot.cn/v1"
  #   api_key: "${MOONSHOT_API_KEY}"
  #   model: "kimi-k2.5"
  #   tier: "standard"
  #   priority: 7

  # 通义千问 (DashScope)
  # qwen:
  #   provider: "qwen"
  #   base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  #   api_key: "${DASHSCOPE_API_KEY}"
  #   model: "qwen-plus"
  #   tier: "standard"
  #   priority: 7

  # 智谱GLM — glm-4-flash免费
  # zhipu:
  #   provider: "zhipu"
  #   base_url: "https://open.bigmodel.cn/api/paas/v4"
  #   api_key: "${ZHIPU_API_KEY}"
  #   model: "glm-4-flash"
  #   tier: "free"
  #   priority: 8

  # 硅基流动 — 多模型聚合
  # siliconflow:
  #   provider: "siliconflow"
  #   base_url: "https://api.siliconflow.cn/v1"
  #   api_key: "${SILICONFLOW_API_KEY}"
  #   model: "Qwen/Qwen2.5-7B-Instruct"
  #   tier: "free"
  #   priority: 6

  # ═══ 需要代理（海外）═══

  # Gemini — Google
  gemini_flash:
    provider: "gemini"
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
    api_key: "${GEMINI_API_KEY}"
    model: "gemini-2.5-flash-lite"
    tier: "free"
    priority: 10

  # OpenAI
  # openai:
  #   provider: "openai"
  #   base_url: "https://api.openai.com/v1"
  #   api_key: "${OPENAI_API_KEY}"
  #   model: "gpt-4o-mini"
  #   tier: "cheap"
  #   priority: 8

  # Groq — 免费极速推理
  # groq:
  #   provider: "groq"
  #   base_url: "https://api.groq.com/openai/v1"
  #   api_key: "${GROQ_API_KEY}"
  #   model: "llama-3.3-70b-versatile"
  #   tier: "free"
  #   priority: 7

  # Anthropic (Claude)
  # anthropic:
  #   provider: "anthropic"
  #   base_url: "https://api.anthropic.com/v1"
  #   api_key: "${ANTHROPIC_API_KEY}"
  #   model: "claude-3-5-haiku-20241022"
  #   tier: "cheap"
