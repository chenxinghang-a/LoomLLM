# ── Token 预算管理 ──
budget:
  daily_limit_usd: 1.0
  warn_threshold: 0.7
  enable_tracking: true

# ── 记忆系统 ──
memory:
  db_path: ".ai_staff_memory.db"
  max_history_per_session: 100
  auto_summarize_every: 20
